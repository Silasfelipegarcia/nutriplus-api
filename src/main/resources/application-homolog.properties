spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:3}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=30000

nutriplus.cache.enabled=${CACHE_ENABLED:true}
nutriplus.cache.user-me-ttl-seconds=300
nutriplus.cache.nutrition-profile-ttl-seconds=600
nutriplus.cache.meal-plan-ttl-seconds=300
nutriplus.cache.shopping-list-ttl-seconds=300
nutriplus.cache.checkins-ttl-seconds=120
nutriplus.cache.progress-ttl-seconds=300
nutriplus.cache.static-content-ttl-seconds=3600

security.jwt.secret=${JWT_SECRET}

rate-limit.enabled=true
idempotency.enabled=true
idempotency.require-key=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://nutriplus-web-ten.vercel.app,https://nutriplus-web.vercel.app,https://nutriplus.app.br,https://www.nutriplus.app.br,https://*.vercel.app}

nutriplus.ai-agent.base-url=${AI_AGENT_URL}

logging.level.br.com.nutriplus=INFO
logging.level.org.springframework.web=WARN
