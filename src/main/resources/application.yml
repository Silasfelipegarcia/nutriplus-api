server:
  port: 8080

spring:
  application:
    name: nutriplus-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/nutriplus?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

nutriplus:
  jwt:
    secret: ${JWT_SECRET:nutriplus-dev-secret-key-change-in-production-min-32-chars}
    expiration-ms: 86400000
  ai-agent:
    base-url: ${AI_AGENT_URL:http://localhost:8000}
  disclaimer: "As recomendações são geradas por IA para fins de apoio e organização alimentar. Consulte um nutricionista para orientação profissional individualizada."

logging:
  level:
    br.com.nutriplus: INFO
