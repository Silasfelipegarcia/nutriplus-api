spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:3}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=30000

nutriplus.cpf.encryption-key=${CPF_ENCRYPTION_KEY}

# Optional: promote first admin when no ADMIN exists (user must already be registered)
nutriplus.admin.bootstrap-email=${BOOTSTRAP_ADMIN_EMAIL:}

nutriplus.email.enabled=${EMAIL_ENABLED:true}
nutriplus.email.resend-api-key=${RESEND_API_KEY:}
nutriplus.email.from=${EMAIL_FROM:noreply@nutriplus.com.br}
nutriplus.email.from-name=${EMAIL_FROM_NAME:Nutri+}
nutriplus.email.frontend-url=${FRONTEND_URL:https://nutriplus.com.br}

security.jwt.secret=${JWT_SECRET}

rate-limit.enabled=true
idempotency.enabled=true
idempotency.require-key=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://nutriplus-web-ten.vercel.app,https://nutriplus-web.vercel.app,https://nutriplus.com.br,https://www.nutriplus.com.br,https://nutriplus.app.br,https://www.nutriplus.app.br,https://*.vercel.app}

logging.level.br.com.nutriplus=INFO
logging.level.org.springframework.web=WARN
