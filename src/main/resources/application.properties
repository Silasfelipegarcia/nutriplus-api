spring.application.name=nutriplus-api

# Local por padrão — em prod/homolog use SPRING_PROFILES_ACTIVE (sobrescreve isto).
spring.profiles.active=local,dev

server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.error.include-message=always
server.error.include-binding-errors=always

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

security.jwt.expiration-seconds=3600
security.jwt.refresh-expiration-seconds=2592000

rate-limit.enabled=true
rate-limit.auth-requests-per-window=20
rate-limit.general-requests-per-window=120
rate-limit.window-seconds=60

nutriplus.ai-agent.base-url=${AI_AGENT_URL:http://localhost:8000}
nutriplus.ai-agent.connect-timeout-seconds=10
nutriplus.ai-agent.read-timeout-seconds=120
nutriplus.ai-agent.health-timeout-seconds=3
nutriplus.ai-agent.max-retries=2

nutriplus.disclaimer=As recomendações são geradas por IA para fins de apoio e organização alimentar. Consulte um nutricionista para orientação profissional individualizada.
nutriplus.observability.slow-request-ms=1000

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,aiAgent
management.metrics.tags.application=nutriplus-api

logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [cid=%X{correlationId} trace=%X{traceId} flow=%X{flowId} session=%X{sessionId} user=%X{userId}] - %msg%n
logging.level.br.com.nutriplus=INFO
