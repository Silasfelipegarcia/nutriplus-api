spring.application.name=nutriplus-api

# Local por padrão — em prod/homolog use SPRING_PROFILES_ACTIVE (sobrescreve isto).
spring.profiles.active=local,dev

server.port=${SERVER_PORT:8080}
server.shutdown=graceful
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
spring.lifecycle.timeout-per-shutdown-phase=30s
server.error.include-message=always
server.error.include-binding-errors=always

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Bancos locais/prod podem ter migrações antigas (ex.: V36 pagamentos) já aplicadas e removidas do repo.
spring.flyway.ignore-migration-patterns=*:missing

security.jwt.expiration-seconds=3600
security.jwt.refresh-expiration-seconds=2592000

rate-limit.enabled=true
rate-limit.auth-requests-per-window=20
rate-limit.general-requests-per-window=120
rate-limit.window-seconds=60
rate-limit.meal-plan-generate-per-hour=3
rate-limit.nutrition-profile-per-hour=10

nutriplus.meal-plan-generation-quota.limited-tier-monthly-quota=1
nutriplus.meal-plan-generation-quota.limited-tier-daily-quota=1
nutriplus.meal-plan-generation-quota.unlimited-tier-daily-quota=3
nutriplus.meal-plan-generation-quota.beta-daily-quota=2
rate-limit.trusted-proxy-ips=${RATE_LIMIT_TRUSTED_PROXIES:127.0.0.1,::1}

management.metrics.token=${METRICS_SCRAPE_TOKEN:}

nutriplus.cache.enabled=${CACHE_ENABLED:false}
# Em prod/homolog o profile ativa CACHE_ENABLED=true por padrão.

nutriplus.cpf.encryption-key=${CPF_ENCRYPTION_KEY:}
# Optional: promote first admin on startup when no ADMIN exists yet
nutriplus.admin.bootstrap-email=${BOOTSTRAP_ADMIN_EMAIL:}
# Optional Redis (multi-replica): spring.data.redis.host=...
# Redis is used for cache/rate-limit only — not Spring Data Redis repositories.
spring.data.redis.repositories.enabled=false
# nutriplus.cache.meal-plan-ttl-seconds=60
# nutriplus.cache.nutrition-profile-ttl-seconds=120

idempotency.enabled=${IDEMPOTENCY_ENABLED:true}
idempotency.require-key=${IDEMPOTENCY_REQUIRE_KEY:true}
idempotency.ttl-hours=${IDEMPOTENCY_TTL_HOURS:24}
idempotency.in-progress-timeout-seconds=${IDEMPOTENCY_IN_PROGRESS_TIMEOUT:120}

nutriplus.ai-agent.base-url=${AI_AGENT_URL:http://localhost:8000}
nutriplus.ai-agent.internal-token=${AI_AGENT_INTERNAL_TOKEN:}
nutriplus.ai-agent.connect-timeout-seconds=10
nutriplus.ai-agent.read-timeout-seconds=120
nutriplus.ai-agent.health-timeout-seconds=3
nutriplus.ai-agent.max-retries=2

spring.config.encoding=UTF-8

nutriplus.disclaimer=Estimativas geradas por IA para apoio e organiza\u00E7\u00E3o alimentar. N\u00E3o constitui prescri\u00E7\u00E3o diet\u00E9tica nem diagn\u00F3stico. Consulte nutricionista ou m\u00E9dico para orienta\u00E7\u00E3o profissional.

nutriplus.legal.version=2026-06-1
nutriplus.legal.privacy-version=2026-06-1
nutriplus.legal.terms-title=Termos de Uso
nutriplus.legal.privacy-title=Política de Privacidade
nutriplus.observability.slow-request-ms=1000
nutriplus.observability.sync-slow-request-ms=300

management.metrics.distribution.percentiles-histogram.nutriplus.http.server.duration=true
management.metrics.distribution.slo.nutriplus.http.server.duration=300ms
management.metrics.distribution.percentiles-histogram.nutriplus.ai.agent.duration=true
management.metrics.distribution.slo.nutriplus.ai.agent.duration=5s,30s

nutriplus.stripe.secret-key=${STRIPE_SECRET_KEY:}
nutriplus.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
nutriplus.stripe.connect-return-url=${STRIPE_CONNECT_RETURN_URL:http://localhost:3000/pro/settings/payments}
nutriplus.stripe.connect-refresh-url=${STRIPE_CONNECT_REFRESH_URL:http://localhost:3000/pro/settings/payments}
nutriplus.stripe.mock-mode=${STRIPE_MOCK_MODE:true}

nutriplus.mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
nutriplus.mercadopago.public-key=${MERCADOPAGO_PUBLIC_KEY:}
nutriplus.mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}
nutriplus.mercadopago.frontend-url=${FRONTEND_URL:http://localhost:4200}
nutriplus.mercadopago.api-public-url=${API_PUBLIC_URL:http://localhost:8080}
nutriplus.mercadopago.api-base-url=${MERCADOPAGO_API_BASE_URL:https://api.mercadopago.com}
nutriplus.mercadopago.athlete-monthly-price-cents=${MERCADOPAGO_ATHLETE_MONTHLY_PRICE_CENTS:2490}
nutriplus.mercadopago.athlete-yearly-price-cents=${MERCADOPAGO_ATHLETE_YEARLY_PRICE_CENTS:19900}
nutriplus.mercadopago.mock-mode=${MERCADOPAGO_MOCK_MODE:true}

nutriplus.email.enabled=${EMAIL_ENABLED:true}
nutriplus.email.resend-api-key=${RESEND_API_KEY:}
nutriplus.email.from=${EMAIL_FROM:noreply@nutriplus.com.br}
nutriplus.email.from-name=${EMAIL_FROM_NAME:Nutri+}
nutriplus.email.frontend-url=${FRONTEND_URL:http://localhost:4200}
nutriplus.email.reset-token-ttl-hours=1

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,aiAgent
management.metrics.tags.application=nutriplus-api

logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [cid=%X{correlationId} trace=%X{traceId} flow=%X{flowId} session=%X{sessionId} user=%X{userId} idem=%X{idempotencyKey}] - %msg%n
logging.level.br.com.nutriplus=INFO
