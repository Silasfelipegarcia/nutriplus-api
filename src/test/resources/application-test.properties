spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

security.jwt.secret=bnV0cmlwbHVzLXRlc3Qtc2VjcmV0LWtleS1taW5pbXVtLTMyLWJ5dGVz
security.jwt.expiration-seconds=3600
security.jwt.refresh-expiration-seconds=2592000

rate-limit.enabled=false

nutriplus.ai-agent.base-url=http://127.0.0.1:19999
nutriplus.ai-agent.connect-timeout-seconds=1
nutriplus.ai-agent.read-timeout-seconds=2
nutriplus.ai-agent.health-timeout-seconds=1

app.cors.allowed-origins=http://localhost:*

management.endpoint.health.group.readiness.include=readinessState,db
