name: k6 Performance Nightly

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'API base URL'
        required: false
        default: 'http://localhost:8080'

jobs:
  k6-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run Tier S smoke
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:8080' }}
        run: |
          mkdir -p perf/k6/results
          k6 run --summary-export perf/k6/results/smoke-summary.json \
            -e BASE_URL="$BASE_URL" \
            perf/k6/smoke.js

      - name: Run portal flow
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:8080' }}
        run: |
          k6 run --summary-export perf/k6/results/portal-summary.json \
            -e BASE_URL="$BASE_URL" \
            perf/k6/tier-s-portal.js

      - name: Regression gate (p95 Tier S)
        run: |
          python3 << 'PY'
          import json, sys
          from pathlib import Path

          baseline = json.loads(Path("perf/k6/baseline.json").read_text())
          limit = baseline["metrics"]["http_req_duration{tier:S}"]["p95_ms"] * baseline["thresholds"]["regression_factor"]

          summary_path = Path("perf/k6/results/smoke-summary.json")
          if not summary_path.exists():
              print("No k6 summary — skip gate when API unreachable")
              sys.exit(0)

          summary = json.loads(summary_path.read_text())
          metrics = summary.get("metrics", {})
          tier_key = None
          for key in metrics:
              if "tier:S" in key and "http_req_duration" in key:
                  tier_key = key
                  break

          if not tier_key:
              print("Tier S metric not found in summary — skipping gate")
              sys.exit(0)

          p95 = metrics[tier_key]["p(95)"]
          print(f"Tier S p95={p95:.2f}ms limit={limit:.2f}ms")
          if p95 > limit:
              print(f"REGRESSION: p95 exceeded baseline by {baseline['thresholds']['regression_factor']}x")
              sys.exit(1)
          PY

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: perf/k6/results/
          retention-days: 14
