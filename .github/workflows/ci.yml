name: CI

on:
  push:
    branches: [main, master, develop, homolog]
  pull_request:
    branches: [main, master, develop, homolog]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functional-gate:
    name: Functional gate (API)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run functional gate
        run: |
          chmod +x scripts/ci-functional-gate.sh
          ./scripts/ci-functional-gate.sh

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: functional-gate
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t nutriplus-api:ci .
