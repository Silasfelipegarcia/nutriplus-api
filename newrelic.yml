# New Relic Java agent — nutriplus-api (Railway prod/homolog).
# License key vem de NEW_RELIC_LICENSE_KEY; app name de NEW_RELIC_APP_NAME.
common: &default_settings
  agent_enabled: true
  distributed_tracing:
    enabled: true
  application_logging:
    forwarding:
      enabled: true
    metrics:
      enabled: true
    local_decorating:
      enabled: true
  attributes:
    enabled: true
    include:
      - correlationId
      - traceId
      - flowId
      - sessionId
      - userId
      - idempotencyKey
      - httpMethod
      - httpPath
      - httpStatus
      - durationMs

production:
  <<: *default_settings

staging:
  <<: *default_settings

development:
  <<: *default_settings
